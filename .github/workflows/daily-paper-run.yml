name: daily-paper-run

# Laptop-independent daily forward paper-run. Refreshes the cache (Yahoo by
# default — keyless; the Robinhood MCP if the secrets are ever set) and ticks
# the forward record, persisting both to the `paper-state` branch. See
# .md/paper-cron-setup.md for one-time setup.

on:
  schedule:
    # 11:17 UTC, Mon-Fri. GitHub cron is UTC-only (no local tz) and may lag a
    # few minutes under load. This lands after the prior US session has settled
    # and before the next open; adjust the hour to taste.
    - cron: "17 11 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write         # push updated state to paper-state via GITHUB_TOKEN

concurrency:
  group: paper-run        # never let two runs clobber each other's state push
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the script can fetch paper-state

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: refresh + tick + persist
        env:
          ROBINHOOD_MCP_URL: ${{ secrets.ROBINHOOD_MCP_URL }}
          ROBINHOOD_MCP_TOKEN: ${{ secrets.ROBINHOOD_MCP_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}  # enables the agent tick; skipped if unset
        run: bash scripts/paper_cron.sh

      # Redeploy the dashboard to Vercel after every run, so
      # https://trading-dashboard-five-pied.vercel.app always shows the latest
      # state — "live" at the cadence the data actually changes (once per
      # weekday run). Skipped (non-fatal) when VERCEL_TOKEN is unset.
      - name: deploy dashboard to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Project link — ids are not secret; they pin the deploy target.
          VERCEL_ORG_ID: team_nIr8FIk1aHaczeM9eK0Qobfu
          VERCEL_PROJECT_ID: prj_CVEuzY6WJp9SUS3r8AELmwnqypXv
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set -- skipping dashboard deploy"
            exit 0
          fi
          mkdir -p site/api
          PYTHONPATH=src python scripts/make_dashboard.py --out site/index.html
          cp deploy_api/trigger-run.js site/api/trigger-run.js
          npx vercel deploy site --prod --yes --token "$VERCEL_TOKEN" \
            || echo "!! dashboard deploy failed -- paper state already persisted" >&2
